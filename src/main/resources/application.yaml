spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: pooli-be
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Do not fail app startup immediately when DB is unavailable
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT}
  flyway:
    enabled: ${FLYWAY_ENABLED}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE}
    out-of-order: true
  security:
    user:
      name: ${SPRING_SECURITY_USER}
      password: ${SPRING_SECURITY_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
    mongodb:
      uri: ${MONGO_URI}
  session:
    store-type: redis
    timeout: ${SESSION_TIMEOUT}
    redis:
      namespace: ${SESSION_REDIS_NAMESPACE}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.pooli
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    #cache-enabled: true

server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT}
      cookie:
        name: ${SESSION_COOKIE_NAME:JSESSIONID}
        http-only: true
        secure: ${SESSION_COOKIE_SECURE}
        same-site: ${SESSION_COOKIE_SAME_SITE}

logging:
  config: classpath:monitoring/logback-spring.xml
  level:
    org.mybatis: ${LOG_LEVEL_MYBATIS}
    org.springframework.jdbc: ${LOG_LEVEL_JDBC}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED}
    path: ${OPENAPI_DOCS_PATH}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED}
    path: ${SWAGGER_UI_PATH}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  traffic:
    outbox:
      retry:
        # PROCESSING 상태 레코드 stale 판정 기본값(초)
        processing-stuck-seconds: ${TRAFFIC_OUTBOX_RETRY_PROCESSING_STUCK_SECONDS:60}
  redis:
    namespace: ${REDIS_NAMESPACE:pooli}


    cache:
      host: ${CACHE_REDIS_HOST}
      port: ${CACHE_REDIS_PORT}
      password: ${CACHE_REDIS_PASSWORD}
      # traffic 정책/차감/멱등 키는 cache Redis에 저장되므로
      # AOF도 cache Redis 기준으로만 켜고 검증합니다.
      aof:
        # AOF 백업 사용 여부
        enabled: ${CACHE_REDIS_AOF_ENABLED:false}
        # 앱 시작 시 Redis CONFIG SET으로 값을 직접 맞출지 여부
        configure-on-startup: ${CACHE_REDIS_AOF_CONFIGURE_ON_STARTUP:true}
        # 기대한 AOF 설정이 아니면 애플리케이션을 즉시 중단할지 여부
        fail-fast: ${CACHE_REDIS_AOF_FAIL_FAST:true}
        # 성능과 유실 범위의 균형값으로 everysec 기본 사용
        appendfsync: ${CACHE_REDIS_AOF_APPEND_FSYNC:everysec}
        # AOF 파일이 일정 비율 이상 커지면 rewrite
        auto-rewrite-percentage: ${CACHE_REDIS_AOF_AUTO_REWRITE_PERCENTAGE:100}
        # 작은 파일에서 rewrite가 과하게 돌지 않도록 최소 크기 지정
        auto-rewrite-min-size: ${CACHE_REDIS_AOF_AUTO_REWRITE_MIN_SIZE:64mb}
        # 재시작 속도를 위해 RDB preamble 사용
        use-rdb-preamble: ${CACHE_REDIS_AOF_USE_RDB_PREAMBLE:true}
        # CONFIG SET 후 redis.conf까지 저장 가능한 환경이면 즉시 반영
        rewrite-config-on-startup: ${CACHE_REDIS_AOF_REWRITE_CONFIG_ON_STARTUP:true}
        # 운영자가 원할 때만 초기 BGREWRITEAOF 수행
        trigger-background-rewrite-on-startup: ${CACHE_REDIS_AOF_TRIGGER_BACKGROUND_REWRITE_ON_STARTUP:false}
      sentinel:
        master: ${CACHE_REDIS_SENTINEL_MASTER:}
        nodes: ${CACHE_REDIS_SENTINEL_NODES:}
        password: ${CACHE_REDIS_SENTINEL_PASSWORD:}

    streams:
      host: ${STREAMS_REDIS_HOST}
      port: ${STREAMS_REDIS_PORT}
      password: ${STREAMS_REDIS_PASSWORD}
      sentinel:
        master: ${STREAMS_REDIS_SENTINEL_MASTER:}
        nodes: ${STREAMS_REDIS_SENTINEL_NODES:}
        password: ${STREAMS_REDIS_SENTINEL_PASSWORD:}

  streams:
    key-traffic-request: ${STREAMS_KEY_TRAFFIC_REQUEST}
    group-traffic: ${STREAMS_GROUP_TRAFFIC}
    consumer-name: ${STREAMS_CONSUMER_NAME:${HOSTNAME:${COMPUTERNAME:__unset_streams_consumer_name__}}-${SERVER_PORT:8080}}
    consumer-enabled: ${STREAMS_CONSUMER_ENABLED:true}
    worker-thread-count: ${STREAMS_WORKER_THREAD_COUNT:8}
    worker-queue-capacity: ${STREAMS_WORKER_QUEUE_CAPACITY:32}
    worker-rejection-policy: ${STREAMS_WORKER_REJECTION_POLICY:abort}
    read-count: ${STREAMS_READ_COUNT:20}
    # 레디스 pending에 몇개 있는지 조회 / 상한값을 둬서 조회 부담 내리기
    metrics-pending-scan-count: ${STREAMS_METRICS_PENDING_SCAN_COUNT:100}
    block-ms: ${STREAMS_BLOCK_MS:2000}
    # Recovery target: pending left by stop/restart should be reclaimable within about 15-17 seconds.
    reclaim-pending-scan-count: ${STREAMS_RECLAIM_PENDING_SCAN_COUNT:100}
    reclaim-interval-ms: ${STREAMS_RECLAIM_INTERVAL_MS:2000}
    reclaim-min-idle-ms: ${STREAMS_RECLAIM_MIN_IDLE_MS:15000}
    shutdown-await-ms: ${STREAMS_SHUTDOWN_AWAIT_MS:10000}
    max-retry: ${STREAMS_MAX_RETRY:5}
    key-traffic-dlq: ${STREAMS_KEY_TRAFFIC_DLQ}
  policy:
    bootstrap:
      reconcile-interval-ms: ${POLICY_BOOTSTRAP_RECONCILE_INTERVAL_MS:300000}
      reconcile-initial-delay-ms: ${POLICY_BOOTSTRAP_RECONCILE_INITIAL_DELAY_MS:60000}

# ==========================================================
# AWS S3 CONFIG
# 로컬 전용 세팅 후 Ec2 사용 시 지우기
# ==========================================================
cloud:
  aws:
    s3:
      bucket: pooli-s3-bucket
    region: ap-northeast-2
# Spring Actuator 헬스 체크 설정(경로: GET [origin]/actuator/health)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: pooli-be
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
