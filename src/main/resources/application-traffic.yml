spring:
  config:
    activate:
      on-profile: traffic
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.session.SessionsEndpointAutoConfiguration
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    hikari:
      # traffic 전용 DB 접근 timeout (5s)
      connection-timeout: ${TRAFFIC_MYSQL_ACCESS_TIMEOUT_MS:5000}
  main:
    web-application-type: servlet
  session:
    store-type: none
  task:
    scheduling:
      enabled: true

management:
  endpoint:
    sessions:
      enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  redis:
    cache:
      # traffic 전용 Redis timeout override (connect/command 1s)
      connect-timeout-ms: ${TRAFFIC_REDIS_CONNECT_TIMEOUT_MS:1000}
      command-timeout-ms: ${TRAFFIC_REDIS_COMMAND_TIMEOUT_MS:1000}
    streams:
      connect-timeout-ms: ${TRAFFIC_REDIS_CONNECT_TIMEOUT_MS:1000}
      command-timeout-ms: ${TRAFFIC_REDIS_COMMAND_TIMEOUT_MS:1000}
  streams:
    consumer-enabled: true
    # reclaim min-idle은 최악 처리시간 * 1.5 규칙으로 계산한다.
    reclaim-worst-processing-ms: ${TRAFFIC_STREAMS_RECLAIM_WORST_PROCESSING_MS:10000}
  traffic:
    deduct:
      redis-retry:
        max-attempts: ${TRAFFIC_DEDUCT_REDIS_RETRY_MAX_ATTEMPTS:3}
        backoff-ms: ${TRAFFIC_DEDUCT_REDIS_RETRY_BACKOFF_MS:50}
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "6"
