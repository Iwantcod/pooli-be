spring:
  config:
    activate:
      on-profile: traffic
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.session.SessionsEndpointAutoConfiguration
  data:
    redis:
      repositories:
        enabled: false
  main:
    web-application-type: servlet
  session:
    store-type: none
  task:
    scheduling:
      enabled: true

management:
  endpoint:
    sessions:
      enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  streams:
    consumer-enabled: true
  traffic:
    deduct:
      redis-retry:
        max-attempts: ${TRAFFIC_DEDUCT_REDIS_RETRY_MAX_ATTEMPTS:3}
        backoff-ms: ${TRAFFIC_DEDUCT_REDIS_RETRY_BACKOFF_MS:50}
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "6"
