services:
  prometheus:
    image: prom/prometheus:latest
    # Prometheus 공식 이미지 사용.
    # 운영 재현성이 필요하면 latest 대신 `prom/prometheus:v2.54.1`처럼 특정 태그로 고정하세요.

    container_name: local-prometheus
    # 컨테이너 이름 고정. `docker ps`, `docker logs local-prometheus`로 식별하기 쉽습니다.

    restart: unless-stopped
    # 컨테이너가 비정상 종료되면 자동 재시작합니다. 사용자가 직접 stop한 경우에는 재시작하지 않습니다.

    ports:
      - "9090:9090"
    # 호스트 9090 -> 컨테이너 9090 매핑.
    # 브라우저에서 http://localhost:9090 으로 Prometheus UI에 접근합니다.

    mem_limit: 512m
    # 로컬 테스트 기준 Prometheus 컨테이너 메모리 제한입니다.

    cpus: 0.50
    # CPU 사용량을 0.5 core로 제한합니다.

    extra_hosts:
      - "host.docker.internal:host-gateway"
    # monitoring compose는 Spring app compose와 분리되어 있습니다.
    # Prometheus가 호스트에 publish된 Spring app(기본 8080)을 scrape할 수 있도록 host alias를 추가합니다.

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 로컬 Prometheus 설정 파일을 컨테이너 내부 설정 경로로 read-only mount합니다.

      - ./rules:/etc/prometheus/rules:ro
      # Redis alert rule 파일들을 컨테이너 내부 rule 경로로 read-only mount합니다.

      - prometheus-data:/prometheus
      # TSDB 데이터 저장 디렉터리입니다. named volume이라 컨테이너 삭제 후에도 시계열 데이터가 유지됩니다.

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # 사용할 Prometheus 설정 파일 경로입니다.

      - --storage.tsdb.path=/prometheus
      # 시계열 데이터 저장 위치입니다. 위 `prometheus-data` volume과 연결됩니다.

      - --storage.tsdb.retention.time=2d
      # 로컬 테스트 용도이므로 데이터 보관 기간을 2일로 짧게 유지합니다.

      - --web.enable-lifecycle
      # HTTP API로 설정 reload를 허용합니다. `POST /-/reload`로 컨테이너 재시작 없이 설정 반영이 가능합니다.

    depends_on:
      - alertmanager
    # Prometheus가 alert를 전달할 Alertmanager를 같은 monitoring compose 안에서 먼저 준비합니다.

  alertmanager:
    image: prom/alertmanager:v0.27.0
    # Prometheus alert를 Discord webhook으로 전달하는 Alertmanager 이미지입니다.

    container_name: local-alertmanager
    # 컨테이너 이름 고정. `docker logs local-alertmanager`로 확인하기 쉽습니다.

    restart: unless-stopped
    # 컨테이너가 비정상 종료되면 자동 재시작합니다.

    ports:
      - "9093:9093"
    # 호스트 9093 -> 컨테이너 9093 매핑.
    # 브라우저에서 http://localhost:9093 으로 Alertmanager UI에 접근합니다.

    mem_limit: 128m
    # 로컬 alert routing 용도 기준 메모리 제한입니다.

    cpus: 0.25
    # CPU 사용량을 0.25 core로 제한합니다.

    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Alertmanager 설정 파일을 컨테이너 내부 설정 경로로 read-only mount합니다.

      - ./secrets/discord_webhook_url:/etc/alertmanager/secrets/discord_webhook_url:ro
      # deploy/monitoring/secrets/discord_webhook_url 파일을 컨테이너 내부 secret 경로로 주입합니다.
      # secrets 디렉터리는 .gitignore로 제외해 webhook URL이 repository에 포함되지 않게 합니다.

    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      # 사용할 Alertmanager 설정 파일 경로입니다.

volumes:
  prometheus-data:
    # Docker가 관리하는 Prometheus TSDB 영속 저장소입니다.
