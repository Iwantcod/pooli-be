reviews:
  auto_review: true

  # 모든 base 브랜치 허용
  base_branches:
    - "*"

  review_status: true
  draft_pr: false
  min_changed_lines: 10

ignore:
  - "build/**"
  - "node_modules/**"
  - "**/*.log"
  - "**/generated/**"

focus:
  - security
  - performance
  - null-safety
  - concurrency

chat:
  language: "ko"